# Render Blueprint — free web service for the Telegram sender.
# Secrets are NOT defined here; set them in the Render dashboard (sync: false
# means Render prompts for them and never stores them in git).
services:
  - type: web
    name: badminton-telegram
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_TARGET_GROUP
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: TELEGRAM_DEFAULT_MESSAGE
        sync: false
      - key: YOUFORM_API_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
